# ================================================================
#  VALUITBIZ – Cloudflare Worker Config
#  Repo: SGMIA26/Buildtosell
# ================================================================

name       = "buildtosell"
main       = "worker.js"
account_id = "bec4ac6e50afa24388861ee2a2940c1c"

compatibility_date  = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Biến môi trường plaintext
[vars]
  ALLOWED_ORIGIN     = "*"
  SEPAY_BANK_BIN     = "970422"
  SEPAY_BANK_ACCOUNT = "0000000000"

# ── KHÔNG đặt [[routes]] ở đây khi chưa verify domain trên Cloudflare
# ── Sau khi domain valuitbiz.com đã active, thêm lại:
# [[routes]]
#   pattern   = "valuitbiz.com/api/*"
#   zone_name = "valuitbiz.com"

# ── Secrets – chạy 1 lần trong terminal:
#   wrangler secret put GOOGLE_SHEET_ID
#   wrangler secret put GOOGLE_SERVICE_ACCOUNT
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID
#   wrangler secret put SEPAY_WEBHOOK_SECRET
#   wrangler secret put RESEND_API_KEY

# ================================================================
#  VALUITBIZ – Cloudflare Worker Config
#  Tài liệu: https://developers.cloudflare.com/workers/wrangler/
# ================================================================

name       = "valuitbiz-backend"
main       = "worker.js"
account_id = "acb6f03d-684e-49e0-a5a3-1de6c779b1f2"   # Thay bằng Account ID thực

compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Routes: Bind Worker vào domain tuỳ chỉnh
[[routes]]
  pattern = "valuitbiz.com/api/*"
  zone_name = "valuitbiz.com"

# ── Biến môi trường (plaintext) – Thêm vào Dashboard cho secret
[vars]
  ALLOWED_ORIGIN     = "https://valuitbiz.com"
  SEPAY_BANK_BIN     = "970422"           # MB Bank
  SEPAY_BANK_ACCOUNT = "0000000000"       # Thay bằng số TK thực

# Secrets (dùng CLI: wrangler secret put TEN_BIEN):
#   wrangler secret put GOOGLE_SHEET_ID
#   wrangler secret put GOOGLE_SERVICE_ACCOUNT
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID
#   wrangler secret put SEPAY_WEBHOOK_SECRET
#   wrangler secret put RESEND_API_KEY
